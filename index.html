<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L10N Status — Slack Template</title>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #22223a;
    --surface-hover: #2a2a45;
    --border: #333358;
    --text: #e0e0e0;
    --text-muted: #8888aa;
    --accent: #7c5cfc;
    --accent-hover: #9b7dff;
    --green: #34d399;
    --section-product: #f59e42;
    --section-marketing: #38bdf8;
    --section-i18n: #f472b6;
    --section-language: #a78bfa;
    --danger: #f87171;
    --radius: 10px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px;
  }
  header {
    text-align: center;
    margin-bottom: 28px;
  }
  header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  header p {
    color: var(--text-muted);
    font-size: 13px;
    margin-top: 4px;
  }
  .actions-bar {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  button {
    font-family: inherit;
    cursor: pointer;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    padding: 10px 20px;
    transition: all 0.15s;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-secondary {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { background: var(--surface-hover); }
  .btn-danger {
    background: transparent;
    color: var(--danger);
    border: 1px solid var(--danger);
    font-size: 11px;
    padding: 4px 10px;
  }
  .btn-danger:hover { background: rgba(248,113,113,0.1); }
  .btn-move {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
    font-size: 11px;
    padding: 4px 8px;
    line-height: 1;
  }
  .btn-move:hover:not(:disabled) {
    background: var(--surface-hover);
    color: var(--text);
    border-color: var(--accent);
  }
  .btn-move:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }
  .btn-add {
    background: transparent;
    color: var(--accent);
    border: 1px dashed var(--accent);
    width: 100%;
    padding: 12px;
    font-size: 13px;
    margin-top: 8px;
  }
  .btn-add:hover { background: rgba(124,92,252,0.08); }
  .toast {
    position: fixed;
    top: 20px;
    right: 20px;
    background: var(--green);
    color: #000;
    padding: 12px 24px;
    border-radius: 8px;
    font-weight: 600;
    font-size: 14px;
    opacity: 0;
    transform: translateY(-10px);
    transition: all 0.3s;
    z-index: 100;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateY(0);
  }
  /* Sections */
  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 20px;
    overflow: hidden;
  }
  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
  }
  .section-header:hover { background: var(--surface-hover); }
  .section-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .section-header h2 {
    font-size: 14px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    flex: 1;
  }
  .section-toggle {
    color: var(--text-muted);
    font-size: 18px;
    transition: transform 0.2s;
  }
  .section.collapsed .section-toggle { transform: rotate(-90deg); }
  .section.collapsed .section-body { display: none; }
  .section-body {
    padding: 4px 18px 18px;
  }
  /* Priority items (Product & Marketing) */
  .priority-group {
    margin-bottom: 14px;
    background: rgba(0,0,0,0.15);
    border-radius: 8px;
    padding: 12px;
  }
  .priority-group:last-child { margin-bottom: 0; }
  .priority-title {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 8px;
  }
  .priority-title input {
    flex: 1;
    background: transparent;
    border: 1px solid transparent;
    color: var(--text);
    font-size: 14px;
    font-weight: 600;
    padding: 4px 8px;
    border-radius: 4px;
  }
  .priority-title input:focus {
    outline: none;
    border-color: var(--accent);
    background: rgba(0,0,0,0.2);
  }
  .bullet-list {
    list-style: none;
    padding-left: 8px;
  }
  .bullet-item {
    display: flex;
    align-items: flex-start;
    gap: 6px;
    margin-bottom: 4px;
  }
  .bullet-item::before {
    content: "•";
    color: var(--text-muted);
    flex-shrink: 0;
    margin-top: 1px;
  }
  .bullet-item input {
    flex: 1;
    background: transparent;
    border: 1px solid transparent;
    color: var(--text);
    font-size: 13px;
    padding: 3px 6px;
    border-radius: 4px;
  }
  .bullet-item input:focus {
    outline: none;
    border-color: var(--border);
    background: rgba(0,0,0,0.2);
  }
  .bullet-item .btn-danger { margin-top: 1px; }
  .bullet-item .btn-move { margin-top: 1px; }
  .add-bullet {
    background: transparent;
    border: none;
    color: var(--accent);
    font-size: 12px;
    cursor: pointer;
    padding: 4px 8px;
    margin-left: 14px;
    margin-top: 2px;
  }
  .add-bullet:hover { text-decoration: underline; }
  /* Language cards */
  .lang-card {
    background: rgba(0,0,0,0.15);
    border-radius: 8px;
    padding: 14px;
    margin-bottom: 12px;
  }
  .lang-card:last-of-type { margin-bottom: 0; }
  .lang-card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .lang-card-header input.lang-name {
    flex: 1;
    background: transparent;
    border: 1px solid transparent;
    color: var(--text);
    font-size: 15px;
    font-weight: 700;
    padding: 4px 8px;
    border-radius: 4px;
  }
  .lang-card-header input.lang-name:focus {
    outline: none;
    border-color: var(--accent);
    background: rgba(0,0,0,0.2);
  }
  .lang-fields {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 10px;
  }
  .lang-field {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(0,0,0,0.15);
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 12px;
  }
  .lang-field label {
    color: var(--text-muted);
    font-weight: 600;
    white-space: nowrap;
  }
  .lang-field input, .lang-field select {
    background: transparent;
    border: none;
    color: var(--text);
    font-size: 12px;
    font-family: inherit;
    padding: 2px 4px;
  }
  .lang-field input:focus, .lang-field select:focus {
    outline: none;
  }
  .lang-field select option { background: var(--surface); }
  .lang-subsection {
    background: rgba(0,0,0,0.1);
    border-radius: 6px;
    padding: 10px 12px;
    margin-bottom: 8px;
  }
  .lang-subsection:last-of-type { margin-bottom: 0; }
  .lang-subsection-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .lang-subsection-label {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
  }
  .lang-subsection select {
    background: transparent;
    border: none;
    color: var(--text);
    font-size: 12px;
    font-family: inherit;
  }
  .lang-subsection select:focus { outline: none; }
  .lang-subsection select option { background: var(--surface); }
  .lang-subsection .bullet-list { padding-left: 4px; }
</style>
</head>
<body>
<header>
  <h1>L10N Status — Slack Template</h1>
  <p>Edit the sections below, then copy the formatted message for Slack</p>
  <p style="color:var(--green);font-size:12px;margin-top:4px" id="save-status"></p>
</header>
<div class="actions-bar">
  <button class="btn-primary" onclick="copyToClipboard()">📋 Copy for Slack</button>
<button class="btn-secondary" onclick="resetToDefaults()" style="color:var(--danger);border-color:var(--danger)">↺ Reset to defaults</button>
</div>
<div class="toast" id="toast">Copied to clipboard ✓</div>
<!-- PRODUCT L10N PRIORITIES -->
<div class="section" id="section-product">
  <div class="section-header" onclick="toggleSection(this)">
    <span class="section-dot" style="background:var(--section-product)"></span>

  <div class="section-body" id="product-body"></div>
</div>
<!-- MARKETING L10N PRIORITIES -->
<div class="section" id="section-marketing">
  <div class="section-header" onclick="toggleSection(this)">
    <span class="section-dot" style="background:var(--section-marketing)"></span>
    <h2>Marketing L10N Priorities</h2>

  <div class="section-body" id="marketing-body"></div>
</div>
<!-- I18N PROJECTS -->
<div class="section" id="section-i18n">
  <div class="section-header" onclick="toggleSection(this)">
    <span class="section-dot" style="background:var(--section-i18n)"></span>
    <h2>i18n Projects</h2>
    <span class="section-toggle">▾</span>
  </div>

</div>
<!-- NEW LANGUAGE STATUS -->
<div class="section" id="section-languages">

    <span class="section-dot" style="background:var(--section-language)"></span>
    <h2>New Language Status</h2>
    <span class="section-toggle">▾</span>
  </div>
  <div class="section-body" id="languages-body"></div>
</div>
<script>
// ——— STORAGE KEY ———
const STORAGE_KEY = 'l10n_slack_template_v3';
// ——— DEFAULT DATA ———
function getDefaults() { return JSON.parse(JSON.stringify(DEFAULT_DATA)); }
const DEFAULT_DATA = {

      ]

  ]
};
// ——— ETA PARSING / FORMATTING HELPERS ———
function tryParseEta(text) {
  if (!text) return { date: '', note: '' };
  const trimmed = String(text).trim();
  if (!trimmed) return { date: '', note: '' };
  // Already ISO?
  if (/^\d{4}-\d{2}-\d{2}$/.test(trimmed)) return { date: trimmed, note: '' };
  // Try to parse things like "April 24" or "April 24, 2026"
  const currentYear = new Date().getFullYear();
  const withYear = /\b\d{4}\b/.test(trimmed) ? trimmed : `${trimmed} ${currentYear}`;
  const ts = Date.parse(withYear);
  if (!isNaN(ts)) {
    const d = new Date(ts);
    const iso = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    return { date: iso, note: '' };
  }
  // Unparseable → keep as note
  return { date: '', note: trimmed };
}
function formatEtaDate(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  if (isNaN(d)) return iso;
  return d.toLocaleDateString('en-GB', { month: 'long', day: 'numeric' });
}
function sortLanguagesByEta() {
  data.languages.sort((a, b) => {
    const aHas = !!a.etaDate;
    const bHas = !!b.etaDate;
    if (aHas && bHas) return a.etaDate.localeCompare(b.etaDate);
    if (aHas) return -1;
    if (bHas) return 1;
    return 0;
  });
}

// ——— LOAD SAVED DATA OR USE DEFAULTS ———
let data;
try {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    data = JSON.parse(saved);
    // Backfill new sections for older saved data
    if (!data.i18n) data.i18n = getDefaults().i18n;
    // Migrate old notes[] → onboardingNotes[] + qaNotes[]
    data.languages.forEach(lang => {
      if (lang.notes && !lang.onboardingNotes) {
        lang.onboardingNotes = lang.notes;
        lang.qaNotes = [];
        delete lang.notes;
      }
      if (!lang.onboardingNotes) lang.onboardingNotes = [];
      if (!lang.qaNotes) lang.qaNotes = [];
      // Migrate old eta (free text) → etaDate + etaNote
      if (lang.eta !== undefined && lang.etaDate === undefined) {
        const parsed = tryParseEta(lang.eta);
        lang.etaDate = parsed.date;
        lang.etaNote = parsed.note;
        delete lang.eta;
      }
      if (lang.etaDate === undefined) lang.etaDate = '';
      if (lang.etaNote === undefined) lang.etaNote = '';
    });
    showSaveStatus('Restored from your last session');
  } else {
    data = getDefaults();
  }
} catch(e) {
  data = getDefaults();
}
function saveData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    showSaveStatus('Saved');
  } catch(e) {}
}
// Auto-save on every change (debounced)
let saveTimer;
function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveData, 400);
}
function showSaveStatus(msg) {
  const el = document.getElementById('save-status');
  el.textContent = msg;
  clearTimeout(el._fadeTimer);
  el._fadeTimer = setTimeout(() => { el.textContent = ''; }, 3000);
}
function resetToDefaults() {
  if (!confirm('This will clear all your edits and restore the original template. Are you sure?')) return;
  localStorage.removeItem(STORAGE_KEY);
  Object.assign(data, getDefaults());
  // Make sure arrays are replaced, not merged
  data.product = getDefaults().product;
  data.marketing = getDefaults().marketing;
  data.languages = getDefaults().languages;
  renderAll();
  showSaveStatus('Reset to defaults');
}
// ——— RENDERING ———
function renderPrioritySection(containerId, items, sectionKey) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  items.forEach((group, gi) => {
    const div = document.createElement('div');
    div.className = 'priority-group';
    const isFirst = gi === 0;
    const isLast = gi === items.length - 1;
    div.innerHTML = `
      <div class="priority-title">
        <button class="btn-move" title="Move up" onclick="movePriorityGroup('${sectionKey}',${gi},-1)" ${isFirst ? 'disabled' : ''}>▲</button>
        <button class="btn-move" title="Move down" onclick="movePriorityGroup('${sectionKey}',${gi},1)" ${isLast ? 'disabled' : ''}>▼</button>
        <input type="text" value="${esc(group.title)}" oninput="data.${sectionKey}[${gi}].title=this.value;scheduleSave()">
        <button class="btn-danger" onclick="removePriorityGroup('${sectionKey}',${gi})">✕</button>
      </div>
      <ul class="bullet-list" id="${sectionKey}-${gi}-bullets"></ul>
      <span class="add-bullet" onclick="addBullet('${sectionKey}',${gi})">+ Add bullet</span>
    `;
    container.appendChild(div);
    const ul = div.querySelector('.bullet-list');
    group.bullets.forEach((b, bi) => {
      addBulletEl(ul, sectionKey, gi, bi, b);
    });
  });
  const addBtn = document.createElement('button');
  addBtn.className = 'btn-add';
  addBtn.textContent = '+ Add priority group';
  addBtn.onclick = () => {
    data[sectionKey].push({ title: '', bullets: [''] });
    renderPrioritySection(containerId, data[sectionKey], sectionKey);
    scheduleSave();
  };
  container.appendChild(addBtn);
}
function addBulletEl(ul, sectionKey, gi, bi, value) {
  const li = document.createElement('li');
  li.className = 'bullet-item';
  li.innerHTML = `
    <input type="text" value="${esc(value)}" oninput="data.${sectionKey}[${gi}].bullets[${bi}]=this.value;scheduleSave()">
    <button class="btn-danger" onclick="removeBullet('${sectionKey}',${gi},${bi})">✕</button>
  `;
  ul.appendChild(li);
}
function renderLanguages() {
  sortLanguagesByEta();
  const container = document.getElementById('languages-body');
  container.innerHTML = '';
  data.languages.forEach((lang, li) => {
    const card = document.createElement('div');
    card.className = 'lang-card';
    card.innerHTML = `
      <div class="lang-card-header">
        <input class="lang-name" type="text" value="${esc(lang.name)}" oninput="data.languages[${li}].name=this.value;scheduleSave()">
        <button class="btn-danger" onclick="removeLanguage(${li})">✕ Remove</button>
      </div>
      <div class="lang-fields">
        <div class="lang-field">
          <label>ETA</label>
          <input type="date" value="${esc(lang.etaDate || '')}" onchange="data.languages[${li}].etaDate=this.value;renderLanguages();scheduleSave()" style="width:150px">
        </div>
        <div class="lang-field">
          <label>ETA note</label>
          <input type="text" value="${esc(lang.etaNote || '')}" placeholder="e.g. Dependent on backfill" oninput="data.languages[${li}].etaNote=this.value;scheduleSave()" style="width:200px">
        </div>
      </div>
      <div class="lang-subsection">
        <div class="lang-subsection-header">
          <span class="lang-subsection-label">Onboarding</span>
          <select onchange="data.languages[${li}].onboarding=this.value;scheduleSave()">
            <option value="" ${lang.onboarding===''?'selected':''}>—</option>
            <option value="Completed" ${lang.onboarding==='Completed'?'selected':''}>Completed</option>
            <option value="In progress" ${lang.onboarding==='In progress'?'selected':''}>In progress</option>
            <option value="Not started" ${lang.onboarding==='Not started'?'selected':''}>Not started</option>
          </select>
        </div>
        <ul class="bullet-list" id="lang-${li}-onboarding"></ul>
        <span class="add-bullet" onclick="addLangSubNote(${li},'onboardingNotes')">+ Add note</span>
      </div>
      <div class="lang-subsection">
        <div class="lang-subsection-header">
          <span class="lang-subsection-label">QA scenarios</span>
          <select onchange="data.languages[${li}].qaStatus=this.value;scheduleSave()">
            <option value="" ${lang.qaStatus===''?'selected':''}>—</option>
            <option value="Completed" ${lang.qaStatus==='Completed'?'selected':''}>Completed</option>
            <option value="In progress" ${lang.qaStatus==='In progress'?'selected':''}>In progress</option>
            <option value="Not started" ${lang.qaStatus==='Not started'?'selected':''}>Not started</option>
          </select>
        </div>
        <ul class="bullet-list" id="lang-${li}-qa"></ul>
        <span class="add-bullet" onclick="addLangSubNote(${li},'qaNotes')">+ Add note</span>
      </div>
    `;
    container.appendChild(card);
    // Render onboarding notes
    const obUl = card.querySelector(`#lang-${li}-onboarding`);
    lang.onboardingNotes.forEach((n, ni) => {
      const item = document.createElement('li');
      item.className = 'bullet-item';
      const isFirst = ni === 0;
      const isLast = ni === lang.onboardingNotes.length - 1;
      item.innerHTML = `
        <button class="btn-move" title="Move up" onclick="moveLangSubNote(${li},'onboardingNotes',${ni},-1)" ${isFirst ? 'disabled' : ''}>▲</button>
        <button class="btn-move" title="Move down" onclick="moveLangSubNote(${li},'onboardingNotes',${ni},1)" ${isLast ? 'disabled' : ''}>▼</button>
        <input type="text" value="${esc(n)}" oninput="data.languages[${li}].onboardingNotes[${ni}]=this.value;scheduleSave()">
        <button class="btn-danger" onclick="removeLangSubNote(${li},'onboardingNotes',${ni})">✕</button>
      `;
      obUl.appendChild(item);
    });
    // Render QA notes
    const qaUl = card.querySelector(`#lang-${li}-qa`);
    lang.qaNotes.forEach((n, ni) => {
      const item = document.createElement('li');
      item.className = 'bullet-item';
      const isFirst = ni === 0;
      const isLast = ni === lang.qaNotes.length - 1;
      item.innerHTML = `
        <button class="btn-move" title="Move up" onclick="moveLangSubNote(${li},'qaNotes',${ni},-1)" ${isFirst ? 'disabled' : ''}>▲</button>
        <button class="btn-move" title="Move down" onclick="moveLangSubNote(${li},'qaNotes',${ni},1)" ${isLast ? 'disabled' : ''}>▼</button>
        <input type="text" value="${esc(n)}" oninput="data.languages[${li}].qaNotes[${ni}]=this.value;scheduleSave()">
        <button class="btn-danger" onclick="removeLangSubNote(${li},'qaNotes',${ni})">✕</button>
      `;
      qaUl.appendChild(item);
    });
  });
  const addBtn = document.createElement('button');
  addBtn.className = 'btn-add';
  addBtn.textContent = '+ Add language';
  addBtn.onclick = () => {
    data.languages.push({ name: '', etaDate: '', etaNote: '', onboarding: '', onboardingNotes: [''], qaStatus: '', qaNotes: [''] });
    renderLanguages();
    scheduleSave();
  };
  container.appendChild(addBtn);
}
// ——— ACTIONS ———
function addBullet(sectionKey, gi) {
  data[sectionKey][gi].bullets.push('');
  rerender(sectionKey);
  scheduleSave();
}
function removeBullet(sectionKey, gi, bi) {
  data[sectionKey][gi].bullets.splice(bi, 1);
  rerender(sectionKey);
  scheduleSave();
}
function removePriorityGroup(sectionKey, gi) {
  data[sectionKey].splice(gi, 1);
  rerender(sectionKey);
  scheduleSave();
}
function movePriorityGroup(sectionKey, gi, delta) {
  const arr = data[sectionKey];
  const newIndex = gi + delta;
  if (newIndex < 0 || newIndex >= arr.length) return;
  const [item] = arr.splice(gi, 1);
  arr.splice(newIndex, 0, item);
  rerender(sectionKey);
  scheduleSave();
}
function addLangSubNote(li, field) {
  data.languages[li][field].push('');
  renderLanguages();
  scheduleSave();
}
function removeLangSubNote(li, field, ni) {
  data.languages[li][field].splice(ni, 1);
  renderLanguages();
  scheduleSave();
}
function moveLangSubNote(li, field, ni, delta) {
  const arr = data.languages[li][field];
  const newIndex = ni + delta;
  if (newIndex < 0 || newIndex >= arr.length) return;
  const [item] = arr.splice(ni, 1);
  arr.splice(newIndex, 0, item);
  renderLanguages();
  scheduleSave();
}
function removeLanguage(li) {
  data.languages.splice(li, 1);
  renderLanguages();
  scheduleSave();
}
function rerender(sectionKey) {
  if (sectionKey === 'product') renderPrioritySection('product-body', data.product, 'product');
  else if (sectionKey === 'i18n') renderPrioritySection('i18n-body', data.i18n, 'i18n');
  else renderPrioritySection('marketing-body', data.marketing, 'marketing');
}
function toggleSection(header) {
  header.closest('.section').classList.toggle('collapsed');
}
function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
// ——— GENERATE SLACK TEXT ———
function generateSlack() {
  let lines = [];
  // Product L10N Priorities
  lines.push('*PRODUCT L10N PRIORITIES*');
  data.product.forEach(group => {
    if (group.title.trim()) {
      lines.push(`• *${group.title.trim()}*`);
      group.bullets.forEach(b => {
        if (b.trim()) lines.push(`    • ${b.trim()}`);
      });
    }
  });
  lines.push('');
  // Marketing L10N Priorities
  lines.push('*MARKETING L10N PRIORITIES*');
  data.marketing.forEach(group => {
    if (group.title.trim()) {
      lines.push(`• *${group.title.trim()}*`);
      group.bullets.forEach(b => {
        if (b.trim()) lines.push(`    • ${b.trim()}`);
      });
    }
  });
  lines.push('');
  // i18n Projects
  lines.push('*I18N PROJECTS*');
  data.i18n.forEach(group => {
    if (group.title.trim()) {
      lines.push(`• *${group.title.trim()}*`);
      group.bullets.forEach(b => {
        if (b.trim()) lines.push(`    • ${b.trim()}`);
      });
    }
  });
  lines.push('');
  // New Language Status
  lines.push('*NEW LANGUAGE STATUS*');
  sortLanguagesByEta();
  data.languages.forEach(lang => {
    if (!lang.name.trim()) return;
    lines.push(`• *${lang.name.trim()}*`);
    const formattedDate = formatEtaDate(lang.etaDate);
    const note = (lang.etaNote || '').trim();
    let etaText = '';
    if (formattedDate && note) etaText = `${formattedDate} (${note})`;
    else if (formattedDate) etaText = formattedDate;
    else if (note) etaText = note;
    if (etaText) lines.push(`    • ETA ${etaText}`);
    if (lang.onboarding) {
      lines.push(`    • Onboarding: ${lang.onboarding}`);
      lang.onboardingNotes.forEach(n => {
        if (n.trim()) lines.push(`        • ${n.trim()}`);
      });
    }
    if (lang.qaStatus) {
      lines.push(`    • QA scenarios: ${lang.qaStatus}`);
      lang.qaNotes.forEach(n => {
        if (n.trim()) lines.push(`        • ${n.trim()}`);
      });
    }
  });
  return lines.join('\n');
}
function copyToClipboard() {
  const text = generateSlack();
  navigator.clipboard.writeText(text).then(() => {
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  });
}
// ——— INIT ———
function renderAll() {
  renderPrioritySection('product-body', data.product, 'product');
  renderPrioritySection('i18n-body', data.i18n, 'i18n');
  renderPrioritySection('marketing-body', data.marketing, 'marketing');
  renderLanguages();
}
renderAll();
</script>
